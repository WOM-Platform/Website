<div class="mx-auto max-w-[1000px]">
  @if (currentUser) {
    <mat-tab-group class="min-w-[800px]" #tabGroup>
      @if (currentUser.role === 'Admin') {
        <mat-tab label="Lista Instruments">
          <app-admin-managment-instruments />
        </mat-tab>
      }
      @if (myInstruments && myInstruments.length > 0) {
        <mat-tab
          label="I miei Instruments"
          >
          <app-my-instruments-collection />
        </mat-tab>
      }
    </mat-tab-group>
  }
</div>
