<div class="overflow-auto">
  <h2 mat-dialog-title>Genera Voucher</h2>

  <mat-dialog-content>
    <form [formGroup]="form" class="flex flex-col gap-4">
      <mat-form-field>
        <mat-label> Quantità </mat-label>

        <input matInput type="number" formControlName="count" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>AIM</mat-label>

        <mat-select formControlName="aim">
          @for(aim of aimList; track aim) {
          <mat-option [value]="aim.code">
            {{ aim.code }} | {{ aim.titles?.it }} | {{ aim.titles?.en }}
          </mat-option>
          }
        </mat-select>
      </mat-form-field>

      <app-map-point-picker
        (locationChange)="onLocationChange($event)"
      ></app-map-point-picker>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Annulla</button>

    <button mat-flat-button [disabled]="form.invalid" (click)="confirm()">
      Genera
    </button>
  </mat-dialog-actions>

  @if (qrValue) {
  <div
    class="mt-6 p-6 border rounded-xl bg-gray-50 flex flex-col items-center gap-4"
  >
    <!-- Success header -->
    <div class="text-center">
      <h3 class="text-lg font-semibold text-green-600">
        Voucher generato con successo
      </h3>
      <p class="text-sm text-gray-500">Scansiona il QR code o usa il link</p>
    </div>

    <!-- QR Card -->
    <div class="bg-white p-4 rounded-lg shadow-sm border">
      <qrcode [qrdata]="qrValue" [width]="220" [errorCorrectionLevel]="'M'">
      </qrcode>
    </div>

    <!-- Link -->
    <div class="w-full text-center">
      <p class="text-xs text-gray-400 mb-1">Link voucher</p>
      <p class="text-sm break-all text-blue-600">
        {{ qrValue }}
      </p>
    </div>

    <!-- Password badge -->
    @if (password) {
    <div class="flex items-center gap-2">
      <span class="text-xs text-gray-500">Password:</span>
      <span
        class="px-3 py-1 bg-gray-200 rounded-full text-sm font-medium tracking-wider"
      >
        {{ password }}
      </span>
    </div>
    }

    <!-- Actions -->
    <div class="flex gap-2 mt-2">
      <button mat-stroked-button (click)="downloadQr()">Download QR</button>

      <button mat-flat-button color="primary" (click)="cancel()">Chiudi</button>
    </div>
  </div>
  }
</div>
