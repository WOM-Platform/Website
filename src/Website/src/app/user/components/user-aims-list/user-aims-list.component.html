<div class="">
  @if (!addAim) {
  <button (click)="onAddAim()" class="btn-default">Gestisci lista aim</button>
  } @if (addAim) {
  <button (click)="handleCancellationAim()" class="btn-default">
    <mat-icon>cancel</mat-icon>
    Annulla
  </button>
  }
</div>
@if (addAim) {
<div class="add-access-container" @fadeInOut>
  <div class="mb-4">
    <label>
      <input
        type="checkbox"
        [(ngModel)]="selectAll"
        (change)="toggleAll($event)"
      />
      <span class="font-semibold text-lg">{{ " " }}Select All</span>
    </label>
  </div>
  <ul class="flex flex-wrap gap-4">
    @for (aim of listAims; track aim) {
    <li>
      <label>
        <input
          type="checkbox"
          [(ngModel)]="aim.isChecked"
          (change)="onAimChange()"
        />
        <span class="font-semibold">{{ " " }}{{ aim.code }}</span>
        {{ " " }}
        {{ aim.titles?.["it"] }}
      </label>
    </li>
    }
  </ul>
  <button
    [disabled]="!hasChanges()"
    (click)="emitSelectedAims()"
    class="btn-default mt-4"
  >
    <mat-icon>check</mat-icon>
    Conferma selezione
  </button>
</div>
}
